name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'   # backend 변경 시에만 실행
  workflow_dispatch:

jobs:
  # 1단계: 테스트 및 코드 품질 검사
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud용 전체 히스토리

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Test & Jacoco Report
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport

      - name: Slack on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: '❌ Backend Test Failed'
          SLACK_COLOR: '#ff0000'

      - name: SonarCloud Scan
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar

  # 2단계: 도커 빌드 및 EC2 배포
  deploy:
    needs: check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # backend 폴더를 컨텍스트로 지정하여 이미지 빌드
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/coin-simulator:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/coin-simulator:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/coin-simulator || { mkdir -p ~/coin-simulator && cd ~/coin-simulator; }

            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

            # 기존 컨테이너/볼륨 정리 후 최신 이미지 기준 재기동
            docker compose down -v || true
            docker compose up -d --pull=always

            docker image prune -f

      - name: Slack on Success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: '🚀 Backend Deploy Success'
          SLACK_COLOR: '#00ff00'
          SLACK_MESSAGE: 'Jeremy님, 백엔드 배포가 완료되었습니다!'
