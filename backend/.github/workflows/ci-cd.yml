deploy:
  needs: check
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    # 1. Docker Hub 로그인
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 2. Docker 이미지 빌드 및 푸시
    - name: Build and Push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/coin-simulator:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/coin-simulator:latest

    # 3. EC2 서버 접속 및 배포 명령 실행
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 프로젝트 폴더로 이동 (없으면 생성)
          cd ~/coin-simulator || mkdir -p ~/coin-simulator && cd ~/coin-simulator
          
          # Docker Hub 로그인 (이미지 pull을 위해 필요)
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          
          # 최신 이미지 가져오기 및 컨테이너 재시작
          docker-compose pull
          docker-compose up -d
          
          # 사용하지 않는 이전 이미지들 삭제 (서버 용량 관리)
          docker image prune -f

    # 4. 배포 성공 알림 (기존에 작성하신 부분)
    - name: Slack on Success
      if: success()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_TITLE: '🚀 Deploy Success'
        SLACK_COLOR: '#00ff00'